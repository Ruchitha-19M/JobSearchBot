name: Job Search

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Job Search
        run: |
          python job1.py

      - name: Upload Excel
        uses: actions/upload-artifact@v4
        with:
          name: JobResults
          path: "*.xlsx"
